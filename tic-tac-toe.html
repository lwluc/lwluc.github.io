<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>luc weinbrecht</title>
    <meta name="description" content="luc weinbrecht protfolio page" />
    <link rel="icon" type="image/x-icon" href="../img/favicon.ico" />
    <link rel="icon" type="image/png" href="../img/favicon.png" />
    <link rel="apple-touch-icon" href="../img/apple-icon.png" />

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="css/TicTacToe.css" />
    <link rel="stylesheet" href="../css/toggle.css" />
    
    <!-- Load logger first (no dependencies) -->
    <script type="module" src="js/logger.js"></script>
    <!-- Load game state (depends on logger) -->
    <script type="module" src="js/game_state.js"></script>
    <!-- Load AI (depends on logger and game_state) -->
    <script type="module" src="js/ai.js"></script>
    <!-- Load UI (depends on logger) -->
    <script type="module" src="js/ui.js"></script>
    <!-- Load main script (depends on all above) -->
    <script type="module" src="js/script.js"></script>
  </head>

  <body>
    <div class="game-content">
      <article style="text-align: center;">
        <div>
          <p>Choose a level:</p>
          <span>Chance to win</span>
          <label class="switch">
            <input id="levelSelector" type="checkbox" checked />
            <span class="slider round"></span>
          </label>
          <span>The real me</span>
        </div>

        <div id="gameboard" class="container"></div>

        <div id="messageboard"></div>
        
        <p style="text-align: center; font-size: 0.9em; color: #666; margin-top: 20px;">
          Tip: Open the console and type <code>skipGame()</code> to bypass the game.
        </p>
      </article>
    </div>

    <div class="source">
      <small>
        <span class="block"
          >Inspired by
          <a href="https://github.com/satyapavan/tic-tac-toe">
            S. Satya Pavan </a
          >.
        </span>
      </small>
    </div>

    <footer>
      <a href="../privacy-policy.html">Datenschutzerklärung</a>
    </footer>
  </body>
</html>
